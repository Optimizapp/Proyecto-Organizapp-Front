<div class="container">
  <h2>{{ isEditMode ? 'Editar' : 'Nueva' }} Empresa</h2>

  <form [formGroup]="companyForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Nombre de la Empresa</label>
      <input formControlName="name" type="text" [class.is-invalid]="companyForm.get('name')?.invalid && companyForm.get('name')?.touched">
      <small *ngIf="companyForm.get('name')?.invalid && companyForm.get('name')?.touched" class="error-text">
        El nombre es obligatorio (mín. 3 caracteres).
      </small>
    </div>

    <div class="form-group">
      <label>NIT</label>
      <input formControlName="nit" type="text">
    </div>

    <div class="form-group">
      <label>Dirección</label>
      <input formControlName="address" type="text">
    </div>

    <div class="form-group">
      <label>Teléfono</label>
      <input formControlName="phone" type="text">
    </div>

    <div class="actions">
      <button type="submit" [disabled]="companyForm.invalid" class="btn-save">Guardar</button>
      <button type="button" (click)="onSubmit()" class="btn-cancel">Cancelar</button>
    </div>
  </form>
</div>
