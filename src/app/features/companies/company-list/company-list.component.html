<div class="container">
  <h2>Gestión de Empresas</h2>

  <button routerLink="/companies/new" class="btn-save" style="margin-bottom: 15px; width: auto;">
    + Registrar Nueva Empresa
  </button>
  
  <div *ngIf="loading" class="alert">Cargando empresas...</div>
  <div *ngIf="errorMessage" class="error">{{ errorMessage }}</div>

  <table *ngIf="!loading && companies.length > 0">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>NIT</th>
        <th>Dirección</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let company of companies">
        <td>{{ company.id }}</td>
        <td>{{ company.name }}</td>
        <td>{{ company.nit }}</td>
        <td>{{ company.address }}</td>
        <td>
          <button class="btn-edit">Editar</button>
          <button class="btn-delete">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!loading && companies.length === 0">
    <p>No hay empresas registradas.</p>
  </div>
</div>
