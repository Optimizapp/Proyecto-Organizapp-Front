<div class="container">
  <h2>Módulo de procesos</h2>
  <p class="subtitle">Vista base del visor de procesos.</p>

  <p *ngIf="isLoading">Cargando...</p>

  <p *ngIf="error">{{ error }}</p>
  <ul *ngIf="(fieldErrors | keyvalue).length > 0">
    <li *ngFor="let fieldError of fieldErrors | keyvalue">{{ fieldError.key }}: {{ fieldError.value }}</li>
  </ul>

  <div class="process-grid" *ngIf="!isLoading && !error && processes.length > 0; else noProcesses">
    <div class="process-card" *ngFor="let process of processes">
      <h3>{{ process.name }}</h3>
      <p>{{ process.description }}</p>
      <span class="status">Estado: {{ process.status }}</span>

      <div class="actions">
        <a [routerLink]="['/processes', process.id]">Ver detalle</a>
      </div>
    </div>
  </div>

  <ng-template #noProcesses>
    <p *ngIf="!isLoading && !error">No hay procesos disponibles para mostrar.</p>
  </ng-template>
</div>
