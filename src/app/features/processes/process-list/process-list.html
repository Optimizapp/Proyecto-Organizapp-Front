<div class="container">
  <div class="header-actions">
    <div>
      <h2>Módulo de procesos</h2>
      <p class="subtitle">
        Visor de procesos con listado, filtros y acceso al editor.
      </p>
    </div>

    <a routerLink="/processes/new" class="create-button">
      Crear proceso
    </a>
  </div>

  <div class="filters">
    <label>
      Buscar por nombre:
      <input
        type="text"
        [(ngModel)]="nameFilter"
        placeholder="Ej: ventas"
      />
    </label>

    <label>
      Filtrar por estado:
      <select [(ngModel)]="statusFilter">
        <option value="">Todos</option>
        <option value="activo">Activo</option>
        <option value="borrador">Borrador</option>
        <option value="inactivo">Inactivo</option>
      </select>
    </label>

    <button type="button" (click)="applyFilters()">Buscar</button>
    <button type="button" class="secondary" (click)="clearFilters()">Limpiar</button>
  </div>

  <div class="process-grid" *ngIf="filteredProcesses.length > 0; else noProcesses">
    <div class="process-card" *ngFor="let process of filteredProcesses">
      <h3>{{ process.name }}</h3>
      <p>{{ process.description }}</p>
      <span class="status">Estado: {{ process.status }}</span>

      <div class="actions">
        <a [routerLink]="['/processes', process.id]">Ver detalle</a>
        <a [routerLink]="['/processes', process.id, 'edit']">Editar</a>
      </div>
    </div>
  </div>

  <ng-template #noProcesses>
    <p>No hay procesos registrados o no coinciden con los filtros.</p>
  </ng-template>
</div>
