<div class="login-container">
  <div class="login-card">
    <h2>Iniciar Sesión</h2>
    <p class="subtitle">Gestión de Procesos Empresariales</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <!-- Campo Email -->
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input 
          id="email"
          type="email" 
          formControlName="email" 
          placeholder="ejemplo@empresa.com"
          [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
        <small class="error-text" *ngIf="loginForm.get('email')?.errors?.['required'] && loginForm.get('email')?.touched">
          El correo es obligatorio.
        </small>
        <small class="error-text" *ngIf="loginForm.get('email')?.errors?.['email'] && loginForm.get('email')?.touched">
          Formato de correo inválido.
        </small>
      </div>

      <!-- Campo Password -->
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          id="password"
          type="password" 
          formControlName="password" 
          placeholder="••••••••"
          [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
        <small class="error-text" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
          La contraseña debe tener al menos 6 caracteres.
        </small>
      </div>

      <!-- Alerta de error del servidor -->
      <div class="alert-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <!-- Botón de Acción -->
      <button type="submit" [disabled]="loginForm.invalid || loading" class="btn-login">
        <span *ngIf="!loading">Ingresar</span>
        <span *ngIf="loading">Autenticando...</span>
      </button>

    </form>
  </div>
</div>
