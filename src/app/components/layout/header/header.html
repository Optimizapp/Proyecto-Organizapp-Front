<header class="top-header">
  <div class="header-left">
    <div class="search-bar">
      <span class="search-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      <input type="text" placeholder="Buscar procesos, empresas o usuarios…" id="global-search" aria-label="Búsqueda global">
    </div>
  </div>

  <div class="header-right">
    <!-- Notificaciones -->
    <button class="header-icon-btn" aria-label="Notificaciones" title="Notificaciones">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 01-3.46 0"/>
      </svg>
      <span class="notif-dot" aria-hidden="true"></span>
    </button>

    <!-- Separador -->
    <span class="header-divider" aria-hidden="true"></span>

    <!-- Perfil -->
    <div class="header-profile">
      <div class="header-avatar" aria-label="Perfil de usuario">A</div>
      <div class="profile-info">
        <span class="profile-name">Admin</span>
        <span class="profile-role">Administrador</span>
      </div>
    </div>
  </div>
</header>
