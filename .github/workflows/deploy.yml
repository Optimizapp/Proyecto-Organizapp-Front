name: Deploy On Premise

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/optimizapp/proyecto_organizapp_front

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    name: Build and test Angular
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular
        run: npm run build

      - name: Test Angular
        run: npm test -- --watch=false

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: ${{ github.event_name != 'pull_request' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:latest .

      - name: Push Docker image
        run: docker push ${{ env.IMAGE_NAME }}:latest

  deploy-on-premise:
    name: Deploy on premise
    runs-on: main
    needs: docker
    if: ${{ github.event_name != 'pull_request' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply Kubernetes deployment
        run: sudo microk8s kubectl apply -f k8s/deployment.yaml

      - name: Restart Kubernetes deployment
        run: sudo microk8s kubectl rollout restart deployment/organizapp-frontend -n grupo14
